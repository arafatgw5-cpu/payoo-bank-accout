<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payoo-website</title>
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    *{
          font-family: "Outfit", sans-serif;
    }
</style>
</head>
<body class="min-h-screen max-w-md mx-auto bg-base-200">
<header class="border-b-2 border-gray-300">
   <section class="w-11/12 mx-auto py-3 flex justify-between items-center">

    <!-- Left side: Logo + Balance -->
    <div class="flex items-center gap-3">
        <img class="w-[60px]" src="/assets/logo.png" alt="logo">

        <div class="balance-info">
            <h2 class="text-2xl font-bold">
                $ <span id="balance">45000</span>
            </h2>
            <p class="text-neutral/50">Available Balance</p>
        </div>
    </div>

    <!-- Right side: Logout -->
    <div>
       <a href="index.html" class="btn btn-soft">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout
        </a>
    </div>

</section>

</header>
<section class="w-11/12 mx-auto py-10 space-y-5">
    <h2 class="text-3xl font-bold">Welcome to Pay <span class="text-primary">oo</span></h2>
    <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and</p>
    <div class="grid grid-cols-3 gap-2">
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="/assets/opt-1.png" alt="" srcset="">
            <p>Add Money</p>

        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="/assets/opt-2.png" alt="" srcset="">
            <p>Cashout</p>

        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="/assets/opt-3.png" alt="" srcset="">
            <p>Transfer Money</p>

        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="/assets/opt-4.png" alt="" srcset="">
            <p>Get Bonus</p>

        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="/assets/opt-5.png" alt="" srcset="">
            <p>Pay Bill</p>

        </button>
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="/assets/opt-6.png" alt="" srcset="">
            <p>Transactions</p>

        </button>

    </div>
                 <!-- Add money form -->
    <section id="add-money" class="w-11/12 mx-auto py-5 ">
        <h2 class="text-xl font-bold mb-5">Add Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Select Bank</label>

                    <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
                        <option disabled selected>Select a Bank</option>
                        <option value="DBBL">DBBL</option>
                        <option value="IBBL">IBBL</option>
                        <option value="CITY">City Bank</option>
                    </select>
                    <br>


                    <label class="label text-neutral font-bold">Banbk Account Number</label>
                    <input id="add-money-number" maxlength="11" minlength="11" type="text"
                        class="input rounded-full bg-base-200 w-full" value="01234567890"
                        placeholder="Enter Bank 11 digit Number" />

                    <br>

                    <label class="label text-neutral font-bold">Amount to Add</label>

                    <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 w-full"
                        placeholder="Enter Amount to Add" />

                    <br>

                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="add-money-pin" type="password" maxlength="4"
                        class="input rounded-full bg-base-200 w-full" placeholder="Enter 4 Digit Pin" />
                    <div></div>
                    <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">Add Money</button>
                </fieldset>
            </div>
        </div>
    </section>

    <section>
       <!-- cashout -->
        <h1 class="font-bold text-xl">Cash Out</h1>
          <div class="form pt-5 rounded-2xl">
   <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label font-bold text-neutral">Agent Number</label>
          <input id="cashout-number" maxlength="11" minlength="11" type="text" class="input rounded-full " placeholder="Enter your number" value="0187675122" />
          <label class="label font-bold text-neutral">Amount</label>
          <input id="cashout-amount" type="number" class="input rounded-full " placeholder="Enter your withdraw" />
          <label class="label font-bold text-neutral">Pin Number</label>
          <input id="cashout-pin" maxlength="4" type="password" class="input rounded-full" placeholder="Enter 4 Digit Pin number" />
          <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
         <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">
    Withdraw Money
</button>

        </fieldset>
      </div>
    </div>
   </div>
    </section>

</section>
<script src="./script/machine.js"></script>
<script src="./script/addmoney.js"></script>
<script src="./script/cashout.js"></script>
</body>
</html>
